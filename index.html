<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ticket Flow Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#5B5FED">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ticket Flow">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">

  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #5B5FED;
      --primary-light: #EEEFFE;
      --primary-dark: #4347D4;
      --bg: #F2F4F8;
      --card: #FFFFFF;
      --border: #E8ECF2;
      --text: #111827;
      --sub: #6B7280;
      --muted: #9CA3AF;
      --red: #EF4444;
      --blue: #3B82F6;
      --green: #10B981;
      --radius-sm: 10px;
      --radius: 16px;
      --radius-lg: 22px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,.06);
      --shadow: 0 4px 16px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.5;
    }

    /* ── NAV ── */
    .tab-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      box-shadow: var(--shadow-sm);
    }
    .tab-btn {
      flex: 1; padding: 16px 0;
      border: none; background: none;
      font-size: 15px; font-weight: 700;
      color: var(--muted); cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s; letter-spacing: -.3px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ── LAYOUT ── */
    .panel { display: none; }
    .panel.active { display: block; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }

    /* ── HEADER ── */
    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(91,95,237,.35);
    }
    .header h1 { font-size: 24px; font-weight: 900; letter-spacing: -.5px; }
    .header p { font-size: 14px; color: var(--sub); margin-top: 1px; }

    /* ── SUMMARY ── */
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
    .scard {
      background: var(--card); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }
    .scard.main {
      grid-column: span 2;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff; border: none;
      box-shadow: 0 4px 20px rgba(91,95,237,.3);
    }
    .scard label { font-size: 13px; font-weight: 600; color: var(--sub); display: block; margin-bottom: 8px; }
    .scard.main label { color: rgba(255,255,255,.75); }
    .scard strong { font-size: 22px; font-weight: 800; letter-spacing: -.5px; }
    .scard.main strong { font-size: 28px; }

    /* ── FORM ── */
    .form-box {
      background: var(--card); padding: 22px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .form-title { font-size: 15px; font-weight: 700; color: var(--sub); display: flex; align-items: center; gap: 6px; margin-bottom: 16px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    input, select {
      width: 100%; padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 500;
      outline: none; background: #fff;
      color: var(--text);
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(91,95,237,.12);
    }
    input::placeholder { color: var(--muted); }
    .btn {
      width: 100%; border: none; padding: 16px;
      border-radius: var(--radius-sm);
      font-weight: 800; font-size: 16px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: opacity .15s, transform .1s;
      font-family: inherit; letter-spacing: -.2px;
    }
    .btn:active { opacity: .85; transform: scale(.98); }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(91,95,237,.3); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-gray { background: #E5E7EB; color: var(--sub); margin-top: 8px; display: none; }

    /* ── RECORDS ── */
    .section-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
    .page-info { font-size: 13px; color: var(--sub); font-weight: 600; }

    .record {
      background: var(--card); padding: 18px;
      border-radius: var(--radius);
      margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: flex-start;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s;
    }
    .record:active { box-shadow: var(--shadow); }
    .record-left { display: flex; flex-direction: column; gap: 4px; }
    .record-team { font-weight: 800; font-size: 16px; letter-spacing: -.3px; }
    .record-date { font-size: 13px; color: var(--sub); font-weight: 500; }
    .record-badge {
      display: inline-block; font-size: 11px; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; margin-top: 2px;
    }
    .badge-we { background: #FEF2F2; color: var(--red); }
    .badge-wd { background: #EFF6FF; color: var(--blue); }
    .record-actions { display: flex; gap: 12px; margin-top: 8px; }
    .record-actions button {
      background: none; border: none;
      font-size: 13px; color: var(--muted);
      text-decoration: underline; cursor: pointer;
      font-family: inherit; padding: 0;
    }
    .record-right { text-align: right; }
    .profit { font-size: 19px; font-weight: 800; letter-spacing: -.5px; }
    .profit-detail { font-size: 12px; color: var(--muted); margin-top: 3px; display: block; }

    /* ── PAGINATION ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 16px;
    }
    .pg-btn {
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--text); font-size: 14px; font-weight: 700;
      padding: 8px 14px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .pg-btn:hover { border-color: var(--primary); color: var(--primary); }
    .pg-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pg-btn:disabled { opacity: .35; cursor: not-allowed; }
    .pg-arrow {
      border: 1.5px solid var(--border); background: var(--card);
      color: var(--text); font-size: 16px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all .15s;
    }
    .pg-arrow:disabled { opacity: .35; cursor: not-allowed; }

    /* ── CHART ── */
    .chart-box {
      background: var(--card); padding: 22px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      margin-top: 22px;
      box-shadow: var(--shadow-sm);
    }
    .chart-title { font-size: 14px; font-weight: 700; color: var(--sub); margin-bottom: 16px; }

    /* ── SCHEDULE ── */
    .sched-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 16px;
    }
    .sched-top h2 { font-size: 22px; font-weight: 900; letter-spacing: -.5px; }
    .kbo-link {
      font-size: 13px; color: var(--primary);
      text-decoration: none; font-weight: 700;
      background: var(--primary-light); padding: 7px 14px;
      border-radius: 20px;
    }

    .filter-box {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; margin-bottom: 16px;
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .filter-row select { font-size: 14px; padding: 12px 14px; }

    .update-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 11px 16px;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; color: var(--sub); font-weight: 500;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; }
    .dot-ok { background: var(--green); }
    .dot-warn { background: #F59E0B; }
    .dot-err { background: var(--red); }

    .notice {
      background: #FFFBEB; border: 1px solid #FDE68A;
      border-radius: var(--radius-sm); padding: 12px 16px;
      margin-bottom: 16px; font-size: 13px; color: #92400E; line-height: 1.6;
    }

    /* Day card */
    .day-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      margin-bottom: 10px; box-shadow: var(--shadow-sm);
    }
    .day-header {
      background: var(--primary-light); padding: 12px 18px;
      font-size: 14px; font-weight: 800; color: var(--primary);
      display: flex; align-items: center; gap: 8px;
      letter-spacing: -.2px;
    }
    .sbadge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .sbadge-we { background: #FEF2F2; color: var(--red); }
    .sbadge-hol { background: #FFF7ED; color: #EA580C; }
    .sbadge-star { background: #FEF9C3; color: #854D0E; }

    .game-row {
      padding: 14px 18px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .game-teams { font-size: 15px; font-weight: 800; letter-spacing: -.3px; }
    .game-meta { font-size: 13px; color: var(--sub); margin-top: 3px; font-weight: 500; }
    .game-note { font-size: 12px; color: #EA580C; margin-top: 2px; }
    .game-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .game-time { font-size: 14px; font-weight: 800; color: var(--primary); }
    .score-box {
      display: flex; align-items: center; gap: 6px;
      background: #F8F9FA; border-radius: 8px; padding: 4px 10px;
    }
    .score-num {
      font-size: 17px; font-weight: 900; letter-spacing: -1px; min-width: 20px; text-align: center;
    }
    .score-sep { font-size: 13px; color: var(--muted); font-weight: 600; }
    .score-win { color: var(--red); }
    .score-lose { color: var(--blue); }
    .score-tie { color: var(--sub); }
    .add-btn-sm {
      background: var(--primary-light); color: var(--primary);
      border: none; font-size: 12px; font-weight: 700;
      padding: 5px 12px; border-radius: 8px; cursor: pointer;
      font-family: inherit;
    }
    .add-btn-sm:active { opacity: .75; }

    .empty { text-align: center; padding: 56px 20px; color: var(--sub); }
    .empty .icon { font-size: 48px; margin-bottom: 14px; }
    .empty strong { display: block; font-size: 16px; font-weight: 800; margin-bottom: 6px; color: var(--text); }
    .empty span { font-size: 14px; }

    .loading { text-align: center; padding: 48px; color: var(--sub); }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STANDINGS ── */
    .standings-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      background: var(--card); border-radius: var(--radius-lg);
      overflow: hidden; box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .standings-table th {
      background: var(--primary); color: #fff;
      padding: 12px 10px; font-size: 12px; font-weight: 700;
      text-align: center; letter-spacing: .3px;
    }
    .standings-table th:first-child { text-align: left; padding-left: 16px; }
    .standings-table td {
      padding: 13px 10px; font-size: 14px; font-weight: 600;
      text-align: center; border-top: 1px solid var(--border);
      color: var(--text);
    }
    .standings-table td:first-child { text-align: left; padding-left: 12px; }
    .standings-table tr:hover td { background: var(--primary-light); }
    .rank-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 50%;
      font-size: 13px; font-weight: 800; margin-right: 8px;
    }
    .rank-1 { background: #FEF08A; color: #854D0E; }
    .rank-2 { background: #E2E8F0; color: #374151; }
    .rank-3 { background: #FED7AA; color: #9A3412; }
    .rank-ps { background: var(--primary-light); color: var(--primary); }
    .rank-other { background: transparent; color: var(--muted); }
    .streak-w { color: var(--red); font-weight: 800; }
    .streak-l { color: var(--blue); font-weight: 800; }
    .standings-table { white-space: nowrap; }
    .standings-table td, .standings-table th { white-space: nowrap; }
    .divider-row td {
      border-top: 2px dashed var(--primary) !important;
    }
  </style>
</head>
<body>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('tracker')">📋 수익 관리</button>
  <button class="tab-btn" onclick="switchTab('schedule')">📅 경기 일정</button>
  <button class="tab-btn" onclick="switchTab('standings')">🏆 순위</button>
</nav>

<!-- ═══ TRACKER ═══ -->
<div id="tab-tracker" class="panel active">
<div class="wrap">
  <header class="header">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
        <path d="M13 5v2M13 17v2M13 11v2"/>
      </svg>
    </div>
    <div>
      <h1>Ticket Flow</h1>
      <p>KBO 양도 수익 매니저</p>
    </div>
  </header>

  <div class="summary-grid">
    <div class="scard main"><label>💰 누적 수익</label><strong id="totalProfit">0원</strong></div>
    <div class="scard"><label>📅 평일 수익</label><strong id="wdProfit">0원</strong></div>
    <div class="scard"><label>🎉 주말 수익</label><strong id="weProfit">0원</strong></div>
  </div>

  <div class="form-box">
    <div id="formTitle" class="form-title">📝 새 기록 입력</div>
    <input type="hidden" id="editId">
    <div class="row2">
      <input type="date" id="tDate" placeholder="경기 일정">
      <select id="tTeam">
        <option value="">홈구단 선택</option>
        <option>LG</option><option>KT</option><option>한화</option><option>두산</option>
        <option>KIA</option><option>삼성</option><option>롯데</option><option>NC</option>
        <option>SSG</option><option>키움</option>
      </select>
    </div>
    <div class="row2">
      <input type="number" id="tBuy" placeholder="구매가 (원)">
      <input type="number" id="tSell" placeholder="양도가 (원)">
    </div>
    <button id="submitBtn" class="btn btn-primary" onclick="handleSave()">저장하기</button>
    <button id="cancelBtn" class="btn btn-gray" onclick="resetForm()">취소</button>
  </div>

  <div class="section-header">
    <div class="section-title">📊 양도 기록</div>
    <div class="page-info" id="recordPageInfo"></div>
  </div>
  <div id="recordList"></div>
  <div class="pagination" id="recordPagination"></div>

  <div class="chart-box">
    <div class="chart-title">월별 수익 현황 (원)</div>
    <div style="height:200px"><canvas id="profitChart"></canvas></div>
  </div>
</div>
</div>

<!-- ═══ SCHEDULE ═══ -->
<div id="tab-schedule" class="panel">
<div class="wrap">
  <div class="sched-top">
    <h2>📅 KBO 일정</h2>
    <a class="kbo-link" href="https://www.koreabaseball.com/schedule/schedule.aspx" target="_blank">KBO 공식 ↗</a>
  </div>

  <div class="update-bar">
    <div style="display:flex;align-items:center">
      <div class="dot dot-warn" id="updateDot"></div>
      <span id="updateStatus">일정 불러오는 중...</span>
    </div>
    <span id="updateTime" style="font-size:12px;color:var(--muted)"></span>
  </div>

  <div class="notice">
    ℹ️ GitHub Actions가 매일 새벽 자동으로 최신 일정을 가져옵니다.<br>
    우천취소·변경은 <strong>KBO 공식 사이트</strong>에서 확인하세요.
  </div>

  <div class="filter-box">
    <div class="filter-row">
      <select id="filterTeam" onchange="filterSchedule()">
        <option value="전체">전체 구단</option>
        <option>LG</option><option>KT</option><option>한화</option><option>두산</option>
        <option>KIA</option><option>삼성</option><option>롯데</option><option>NC</option>
        <option>SSG</option><option>키움</option>
      </select>
      <select id="filterMonth" onchange="filterSchedule()">
        <option value="all">전체 기간</option>
        <option value="06">6월</option>
        <option value="07">7월</option>
        <option value="08">8월</option>
        <option value="09">9월</option>
        <option value="10">10월</option>
      </select>
    </div>
  </div>

  <div class="section-header" style="margin-bottom:12px">
    <div class="page-info" id="schedPageInfo"></div>
  </div>

  <div id="scheduleList">
    <div class="loading"><div class="spinner"></div>일정 로딩 중...</div>
  </div>
  <div class="pagination" id="schedPagination"></div>
</div>
</div>


<!-- ═══ STANDINGS ═══ -->
<div id="tab-standings" class="panel">
<div class="wrap">
  <div class="sched-top">
    <h2>🏆 팀 순위</h2>
    <span id="standingsUpdated" style="font-size:12px;color:var(--muted)"></span>
  </div>

  <div id="standingsList">
    <div class="loading"><div class="spinner"></div>순위 불러오는 중...</div>
  </div>
</div>
</div>

<script>
// ── 탭 ──────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const idx = {tracker:0, schedule:1, standings:2}[tab] || 0;
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if ((tab === 'schedule' || tab === 'standings') && !window._schedLoaded) loadSchedule();
  if (tab === 'standings' && window._schedLoaded) renderStandings();
}

function renderStandings() {
  const data = window._schedData;
  if (!data || !data.standings || data.standings.length === 0) {
    document.getElementById('standingsList').innerHTML =
      `<div class="empty"><div class="icon">😕</div><strong>순위 데이터가 없어요</strong><span>Actions를 실행해 schedule.json을 업데이트해 주세요.</span></div>`;
    return;
  }
  document.getElementById('standingsUpdated').textContent = data.updated ? `기준: ${data.updated}` : '';

  const TEAM_EMOJI = {LG:'🔵',KT:'🔴',한화:'🟠',두산:'🔵',KIA:'⚫',SSG:'🔴',삼성:'🔵',롯데:'🔵',NC:'🟢',키움:'🔴'};

  let rows = '';
  data.standings.forEach((s, i) => {
    const rankCls = s.rank===1?'rank-1':s.rank===2?'rank-2':s.rank===3?'rank-3':s.rank<=5?'rank-ps':'rank-other';
    const streakCls = s.streak.includes('W') ? 'streak-w' : 'streak-l';

    // 5위와 6위 사이 포스트시즌 구분선
    const divClass = s.rank === 6 ? ' class="divider-row"' : '';

    rows += `<tr${divClass}>
      <td>
        <span class="rank-num ${rankCls}">${s.rank}</span>
        ${TEAM_EMOJI[s.team]||'⚾'} ${s.team}
      </td>
      <td>${s.w}</td>
      <td>${s.l}</td>
      <td>${s.d}</td>
      <td style="font-weight:800">${s.pct}</td>
      <td>${s.gb}</td>
      <td><span class="${streakCls}">${s.streak}</span></td>
    </tr>`;
  });

  document.getElementById('standingsList').innerHTML = `
    <table class="standings-table">
      <thead>
        <tr>
          <th>팀</th><th>승</th><th>패</th><th>무</th>
          <th>승률</th><th>GB</th><th>연속</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center">
      🔵 1~5위 포스트시즌 진출권 &nbsp;|&nbsp; 연속: 빨간=연승, 파란=연패
    </div>`;
}

// ── 스케줄 로딩 ──────────────────────────────
let scheduleData = [];
let filteredDays = []; // [{date, games[]}]
let schedPage = 0;
const SCHED_PER_PAGE = 5; // 날짜(일) 기준 페이지당 5일
window._schedLoaded = false;

async function loadSchedule() {
  try {
    const res = await fetch('./schedule.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    scheduleData = data.games || [];
    window._schedLoaded = true;
    const dot = document.getElementById('updateDot');
    dot.className = 'dot dot-ok';
    document.getElementById('updateStatus').textContent = '최신 데이터';
    document.getElementById('updateTime').textContent = data.updated ? `업데이트: ${data.updated}` : '';
    window._schedData = data;
    filterSchedule();
    // 순위 탭이 열려있으면 바로 렌더
    if (document.getElementById('tab-standings').classList.contains('active')) renderStandings();
  } catch (e) {
    document.getElementById('updateDot').className = 'dot dot-err';
    document.getElementById('updateStatus').textContent = 'schedule.json 로드 실패';
    document.getElementById('scheduleList').innerHTML = `
      <div class="empty">
        <div class="icon">⚠️</div>
        <strong>일정 파일을 찾을 수 없어요</strong>
        <span>Actions → KBO 일정 자동 업데이트 → Run workflow를 실행해 주세요.</span>
      </div>`;
  }
}

function filterSchedule() {
  const teamF = document.getElementById('filterTeam').value;
  const monthF = document.getElementById('filterMonth').value;
  const today = new Date().toISOString().slice(0, 10);

  const games = scheduleData.filter(g => {
    if (monthF !== 'all' && g.date.slice(5, 7) !== monthF) return false;
    if (teamF !== '전체' && g.home !== teamF && g.away !== teamF) return false;
    return true;
  });

  // 날짜별 그룹
  const map = {};
  games.forEach(g => { (map[g.date] = map[g.date] || []).push(g); });
  filteredDays = Object.entries(map).sort(([a],[b]) => a.localeCompare(b)).map(([date, gs]) => ({date, games: gs}));

  // 오늘 날짜에 가장 가까운 페이지로 이동
  const todayStr = new Date(new Date().getTime() + 9 * 60 * 60 * 1000).toISOString().slice(0, 10);
  const todayIdx = filteredDays.findIndex(d => d.date >= todayStr);
  const startIdx = todayIdx >= 0 ? todayIdx : Math.max(0, filteredDays.length - SCHED_PER_PAGE);
  schedPage = Math.floor(startIdx / SCHED_PER_PAGE);

  renderSchedulePage();
}

function renderSchedulePage() {
  if (filteredDays.length === 0) {
    document.getElementById('scheduleList').innerHTML = `<div class="empty"><div class="icon">😕</div><strong>해당 일정이 없어요</strong><span>필터를 변경해보세요</span></div>`;
    document.getElementById('schedPagination').innerHTML = '';
    document.getElementById('schedPageInfo').textContent = '';
    return;
  }

  const totalPages = Math.ceil(filteredDays.length / SCHED_PER_PAGE);
  const pageDays = filteredDays.slice(schedPage * SCHED_PER_PAGE, (schedPage + 1) * SCHED_PER_PAGE);
  const kstNow = new Date(new Date().getTime() + 9 * 60 * 60 * 1000);
  const today = kstNow.toISOString().slice(0, 10);

  const DAYS = ['일','월','화','수','목','금','토'];
  const TEAM_EMOJI = {LG:'🔵',KT:'🔴',한화:'🟠',두산:'🔵',KIA:'⚫',SSG:'🔴',삼성:'🔵',롯데:'🔵',NC:'🟢',키움:'🔴'};

  document.getElementById('schedPageInfo').textContent =
    `${schedPage + 1} / ${totalPages} 페이지`;

  let html = '';
  pageDays.forEach(({date, games}) => {
    const d = new Date(date + 'T00:00:00');
    const dow = d.getDay();
    const isWE = dow === 0 || dow === 6;
    const isPast = date < today;
    const label = `${parseInt(date.slice(5,7))}/${parseInt(date.slice(8,10))} (${DAYS[dow]})`;

    let badges = isWE ? `<span class="sbadge sbadge-we">주말</span>` : '';
    if (isPast) badges += `<span class="sbadge" style="background:#F3F4F6;color:var(--muted)">종료</span>`;
    const specialNote = games.find(g => g.note);
    if (specialNote?.note?.includes('올스타')) badges += `<span class="sbadge sbadge-star">⭐ 올스타</span>`;
    else if (specialNote) badges += `<span class="sbadge sbadge-hol">공휴일</span>`;

    html += `<div class="day-card">
      <div class="day-header">📆 ${label} ${badges}</div>`;

    games.forEach(g => {
      if (g.note && !g.home) {
        html += `<div style="padding:14px 18px;text-align:center;font-size:15px;font-weight:800;color:#854D0E;border-top:1px solid var(--border)">${g.note}</div>`;
      } else {
        const emoji = TEAM_EMOJI[g.home] || '⚾';
        html += `<div class="game-row">
          <div>
            <div class="game-teams">${emoji} ${g.home} <span style="color:var(--muted);font-weight:500;font-size:13px">vs</span> ${g.away}</div>
            <div class="game-meta">🏟️ ${g.stadium || '-'}</div>
            ${g.note ? `<div class="game-note">${g.note}</div>` : ''}
          </div>
          <div class="game-right">
            ${isPast && g.score_home !== undefined
              ? (() => {
                  const aw = g.score_away, hw = g.score_home;
                  const awCls = aw > hw ? 'score-win' : aw < hw ? 'score-lose' : 'score-tie';
                  const hwCls = hw > aw ? 'score-win' : hw < aw ? 'score-lose' : 'score-tie';
                  return `<div class="score-box">
                    <span class="score-num ${awCls}">${aw}</span>
                    <span class="score-sep">:</span>
                    <span class="score-num ${hwCls}">${hw}</span>
                  </div>`;
                })()
              : g.time ? `<span class="game-time">${g.time}</span>`
              : '<span class="game-time" style="color:var(--muted)">-</span>'
            }
            ${!isPast ? `<button class="add-btn-sm" onclick="quickAdd('${date}','${g.home}')">+ 기록 추가</button>` : ''}
          </div>
        </div>`;
      }
    });
    html += `</div>`;
  });

  document.getElementById('scheduleList').innerHTML = html;
  renderSchedPagination(totalPages);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderSchedPagination(totalPages) {
  if (totalPages <= 1) { document.getElementById('schedPagination').innerHTML = ''; return; }
  let html = `<button class="pg-arrow" onclick="schedGoPage(${schedPage-1})" ${schedPage===0?'disabled':''}>‹</button>`;
  const range = getPageRange(schedPage, totalPages);
  range.forEach(p => {
    if (p === '...') html += `<span style="padding:0 4px;color:var(--muted)">…</span>`;
    else html += `<button class="pg-btn ${p===schedPage?'active':''}" onclick="schedGoPage(${p})">${p+1}</button>`;
  });
  html += `<button class="pg-arrow" onclick="schedGoPage(${schedPage+1})" ${schedPage===totalPages-1?'disabled':''}>›</button>`;
  document.getElementById('schedPagination').innerHTML = html;
}

function schedGoPage(p) {
  const total = Math.ceil(filteredDays.length / SCHED_PER_PAGE);
  if (p < 0 || p >= total) return;
  schedPage = p;
  renderSchedulePage();
}

// ── 수익 트래커 ──────────────────────────────
let db = JSON.parse(localStorage.getItem('kbo_final')) || [];
let chart;
let recordPage = 0;
const REC_PER_PAGE = 8;

function isWE(d) { const day = new Date(d).getDay(); return day === 0 || day === 6; }
function sortDB() { db.sort((a,b) => new Date(b.date) - new Date(a.date)); }

function handleSave() {
  const id = document.getElementById('editId').value;
  const date = document.getElementById('tDate').value;
  const team = document.getElementById('tTeam').value;
  const buy = parseInt(document.getElementById('tBuy').value) || 0;
  const sell = parseInt(document.getElementById('tSell').value) || 0;
  if (!date || !team) return alert('날짜와 팀을 선택해주세요.');
  const rec = { id: id ? parseInt(id) : Date.now(), date, team, buy, sell, profit: sell - buy };
  if (id) { const i = db.findIndex(x => x.id === parseInt(id)); db[i] = rec; }
  else db.push(rec);
  sortDB();
  localStorage.setItem('kbo_final', JSON.stringify(db));
  resetForm(); renderAll();
}

function startEdit(id) {
  const it = db.find(x => x.id === id);
  document.getElementById('editId').value = it.id;
  document.getElementById('tDate').value = it.date;
  document.getElementById('tTeam').value = it.team;
  document.getElementById('tBuy').value = it.buy;
  document.getElementById('tSell').value = it.sell;
  document.getElementById('formTitle').innerText = '🔄 기록 수정 중...';
  document.getElementById('submitBtn').innerText = '수정 완료';
  document.getElementById('submitBtn').className = 'btn btn-green';
  document.getElementById('cancelBtn').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  ['editId','tDate','tTeam','tBuy','tSell'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('formTitle').innerText = '📝 새 기록 입력';
  document.getElementById('submitBtn').innerText = '저장하기';
  document.getElementById('submitBtn').className = 'btn btn-primary';
  document.getElementById('cancelBtn').style.display = 'none';
}

function deleteRecord(id) {
  if (confirm('정말 삭제하시겠습니까?')) {
    db = db.filter(x => x.id !== id);
    localStorage.setItem('kbo_final', JSON.stringify(db));
    renderAll();
  }
}

function getPageRange(current, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i);
  const pages = [0];
  if (current > 2) pages.push('...');
  for (let i = Math.max(1, current-1); i <= Math.min(total-2, current+1); i++) pages.push(i);
  if (current < total - 3) pages.push('...');
  pages.push(total - 1);
  return pages;
}

function renderAll() {
  sortDB();
  const total = db.reduce((s,i) => s+i.profit, 0);
  const wd = db.filter(x => !isWE(x.date)).reduce((s,i) => s+i.profit, 0);
  const we = db.filter(x => isWE(x.date)).reduce((s,i) => s+i.profit, 0);
  document.getElementById('totalProfit').innerText = total.toLocaleString() + '원';
  document.getElementById('wdProfit').innerText = wd.toLocaleString() + '원';
  document.getElementById('weProfit').innerText = we.toLocaleString() + '원';
  renderRecordPage();
  updateChart();
}

function renderRecordPage() {
  const totalPages = Math.ceil(db.length / REC_PER_PAGE);
  if (recordPage >= totalPages) recordPage = Math.max(0, totalPages - 1);
  const pageItems = db.slice(recordPage * REC_PER_PAGE, (recordPage + 1) * REC_PER_PAGE);

  document.getElementById('recordPageInfo').textContent =
    db.length > 0 ? `${db.length}건 · ${recordPage+1}/${Math.max(1,totalPages)}p` : '';

  document.getElementById('recordList').innerHTML = pageItems.length === 0
    ? `<div class="empty"><div class="icon">📋</div><strong>기록이 없어요</strong><span>첫 번째 양도 기록을 입력해보세요!</span></div>`
    : pageItems.map(it => `
    <div class="record">
      <div class="record-left">
        <span class="record-team">${it.team} 홈</span>
        <span class="record-date">${it.date}</span>
        <span class="record-badge ${isWE(it.date) ? 'badge-we' : 'badge-wd'}">${isWE(it.date) ? '주말' : '평일'}</span>
        <div class="record-actions">
          <button onclick="startEdit(${it.id})">수정</button>
          <button onclick="deleteRecord(${it.id})" style="color:var(--red)">삭제</button>
        </div>
      </div>
      <div class="record-right">
        <span class="profit" style="color:${it.profit>=0?'var(--red)':'var(--blue)'}">
          ${it.profit>=0?'+':''}${it.profit.toLocaleString()}원
        </span>
        <span class="profit-detail">${it.sell.toLocaleString()} − ${it.buy.toLocaleString()}</span>
      </div>
    </div>`).join('');

  // 페이지네이션
  if (totalPages <= 1) { document.getElementById('recordPagination').innerHTML = ''; return; }
  let html = `<button class="pg-arrow" onclick="recGoPage(${recordPage-1})" ${recordPage===0?'disabled':''}>‹</button>`;
  getPageRange(recordPage, totalPages).forEach(p => {
    if (p === '...') html += `<span style="padding:0 4px;color:var(--muted)">…</span>`;
    else html += `<button class="pg-btn ${p===recordPage?'active':''}" onclick="recGoPage(${p})">${p+1}</button>`;
  });
  html += `<button class="pg-arrow" onclick="recGoPage(${recordPage+1})" ${recordPage===totalPages-1?'disabled':''}>›</button>`;
  document.getElementById('recordPagination').innerHTML = html;
}

function recGoPage(p) {
  const total = Math.ceil(db.length / REC_PER_PAGE);
  if (p < 0 || p >= total) return;
  recordPage = p;
  renderRecordPage();
  document.getElementById('recordList').scrollIntoView({behavior:'smooth', block:'start'});
}

function quickAdd(date, team) {
  switchTab('tracker');
  document.getElementById('tDate').value = date;
  document.getElementById('tTeam').value = team;
  document.getElementById('tBuy').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateChart() {
  const ctx = document.getElementById('profitChart').getContext('2d');
  const stats = {};
  [...db].sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(i => {
    const m = i.date.slice(5,7) + '월'; stats[m] = (stats[m]||0) + i.profit;
  });
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(stats),
      datasets: [{
        data: Object.values(stats),
        backgroundColor: Object.values(stats).map(v => v >= 0 ? 'rgba(91,95,237,.85)' : 'rgba(239,68,68,.75)'),
        borderRadius: 8, borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { font: {size:12}, callback: v => v.toLocaleString()+'원' }, grid: {color:'#F2F4F8'} },
                x: { ticks: {font:{size:13}} } }
    }
  });
}

// 초기화
window.addEventListener('DOMContentLoaded', () => {
  const m = String(new Date().getMonth() + 1).padStart(2, '0');
  const sel = document.getElementById('filterMonth');
  for (const opt of sel.options) { if (opt.value === m) { opt.selected = true; break; } }
  renderAll();
});
</script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW 등록 완료'))
          .catch(e => console.log('SW 등록 실패:', e));
      });
    }

    // 앱이 포그라운드로 돌아올 때 schedule.json 자동 갱신
    let lastFocusTime = Date.now();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        const elapsed = Date.now() - lastFocusTime;
        // 5분 이상 백그라운드였으면 자동 새로고침
        if (elapsed > 5 * 60 * 1000) {
          window._schedLoaded = false;
          loadSchedule();
        }
        lastFocusTime = Date.now();
      } else {
        lastFocusTime = Date.now();
      }
    });
  </script>
