<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ticket Flow Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3172/3172551.png">
    <link rel="manifest" href="data:application/manifest+json,{'name':'TicketFlow','short_name':'TicketFlow','start_url':'.','display':'standalone','background_color':'#ffffff','theme_color':'#6366f1','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/3172/3172551.png','sizes':'512x512','type':'image/png'}]}">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-sub: #64748b; --accent-up: #ef4444; --accent-down: #3b82f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background-color: var(--bg); color: var(--text-main); }
        .app-container { max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 50px; }
        .header-box { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .logo-icon { width: 42px; height: 42px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
        .summary-card { background: var(--card-bg); padding: 15px; border-radius: 16px; border: 1px solid #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .summary-card span { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 4px; margin-bottom: 5px; font-weight: 600; }
        .summary-card strong { font-size: 16px; font-weight: 800; }
        .summary-card.main { grid-column: span 2; background: var(--primary); color: white; }
        .summary-card.main span { color: rgba(255,255,255,0.8); }
        .input-form { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .form-title { font-size: 14px; font-weight: 700; color: var(--text-sub); display:block; margin-bottom:12px; display: flex; align-items: center; gap: 5px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; }
        .add-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; }
        .update-mode-btn { background: #10b981; }
        .list-header { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
        .ticket-item { background: var(--card-bg); padding: 16px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9; }
        .item-info { display: flex; flex-direction: column; gap: 2px; }
        .item-team { font-weight: 800; font-size: 15px; }
        .item-date { font-size: 12px; color: var(--text-sub); }
        .btn-group { display: flex; gap: 10px; margin-top: 8px; }
        .btn-group button { background: none; border: none; padding: 0; font-size: 12px; color: var(--text-sub); text-decoration: underline; cursor: pointer; }
        .item-right { text-align: right; }
        .profit-val { font-size: 17px; font-weight: 800; }
        .calc-detail { font-size: 10px; color: #94a3b8; display: block; }
        .chart-box { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-top: 24px; border: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header-box">
        <div class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>
        </div>
        <div>
            <h1 style="margin:0; font-size: 22px;">Ticket Flow</h1>
            <p style="margin:0; color: var(--text-sub); font-size: 13px;">KBO 양도 수익 매니저</p>
        </div>
    </header>

    <div class="summary-grid">
        <div class="summary-card main">
            <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> 누적 수익</span>
            <strong id="totalProfit">0원</strong>
        </div>
        <div class="summary-card">
            <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 평일</span>
            <strong id="wdProfit">0원</strong>
        </div>
        <div class="summary-card">
            <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m16 12-4-4-4 4M12 8v8"/></svg> 주말</span>
            <strong id="weProfit">0원</strong>
        </div>
    </div>

    <div class="input-form">
        <span id="formTitle" class="form-title">📝 새 기록 입력</span>
        <input type="hidden" id="editId">
        <div class="form-row">
            <input type="date" id="tDate">
            <select id="tTeam">
                <option value="">홈구단 선택</option>
                <option value="LG">LG 트윈스</option><option value="KT">KT 위즈</option><option value="한화">한화 이글스</option><option value="두산">두산 베어스</option><option value="KIA">KIA 타이거즈</option><option value="삼성">삼성 라이온즈</option><option value="롯데">롯데 자이언츠</option><option value="NC">NC 다이노스</option><option value="SSG">SSG 랜더스</option><option value="키움">키움 히어로즈</option>
            </select>
        </div>
        <div class="form-row">
            <input type="number" id="tBuy" placeholder="구매가">
            <input type="number" id="tSell" placeholder="양도가">
        </div>
        <button id="submitBtn" class="add-btn" onclick="handleSave()">저장하기</button>
        <button id="cancelBtn" class="add-btn" style="background:#cbd5e1; display:none; margin-top:5px;" onclick="resetForm()">취소</button>
    </div>

    <div class="list-header">📊 양도 기록 리스트 (최신순)</div>
    <div id="recordList"></div>

    <div class="chart-box">
        <div style="font-size: 14px; font-weight: 700; margin-bottom: 15px; color: var(--text-sub);">월별 수익 현황 (원)</div>
        <div style="height: 200px;"><canvas id="profitChart"></canvas></div>
    </div>
</div>

<script>
    // 기존 데이터 보존을 위해 키값 'kbo_final' 유지
    let db = JSON.parse(localStorage.getItem('kbo_final')) || [];
    let chart;

    function isWeekend(d) {
        const day = new Date(d).getDay();
        return day === 0 || day === 6;
    }

    // [중요] 저장 시 날짜순으로 정렬하는 함수
    function sortDB() {
        db.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function handleSave() {
        const id = document.getElementById('editId').value;
        const date = document.getElementById('tDate').value;
        const team = document.getElementById('tTeam').value;
        const buy = parseInt(document.getElementById('tBuy').value) || 0;
        const sell = parseInt(document.getElementById('tSell').value) || 0;

        if(!date || !team) return alert("날짜와 팀을 선택해주세요.");

        const profit = sell - buy;
        const record = { id: id ? parseInt(id) : Date.now(), date, team, buy, sell, profit };

        if(id) {
            const idx = db.findIndex(x => x.id === parseInt(id));
            db[idx] = record;
        } else {
            db.push(record);
        }

        sortDB(); // 저장 후 즉시 정렬
        localStorage.setItem('kbo_final', JSON.stringify(db));
        resetForm();
        renderAll();
    }

    function startEdit(id) {
        const item = db.find(x => x.id === id);
        document.getElementById('editId').value = item.id;
        document.getElementById('tDate').value = item.date;
        document.getElementById('tTeam').value = item.team;
        document.getElementById('tBuy').value = item.buy;
        document.getElementById('tSell').value = item.sell;
        document.getElementById('formTitle').innerText = "🔄 기록 수정 중...";
        document.getElementById('submitBtn').innerText = "수정 완료하기";
        document.getElementById('submitBtn').classList.add('update-mode-btn');
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('editId').value = '';
        document.getElementById('tDate').value = '';
        document.getElementById('tTeam').value = '';
        document.getElementById('tBuy').value = '';
        document.getElementById('tSell').value = '';
        document.getElementById('formTitle').innerText = "📝 새 기록 입력";
        document.getElementById('submitBtn').innerText = "저장하기";
        document.getElementById('submitBtn').classList.remove('update-mode-btn');
        document.getElementById('cancelBtn').style.display = 'none';
    }

    function deleteRecord(id) {
        if(confirm("정말 삭제하시겠습니까?")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('kbo_final', JSON.stringify(db));
            renderAll();
        }
    }

    function renderAll() {
        sortDB(); // 렌더링 전 다시 한 번 정렬 확인
        const list = document.getElementById('recordList');
        list.innerHTML = db.map(item => {
            const we = isWeekend(item.date);
            return `
                <div class="ticket-item">
                    <div class="item-info">
                        <span class="item-team">${item.team} 홈</span>
                        <span class="item-date">${item.date} (${we ? '주말' : '평일'})</span>
                        <div class="btn-group">
                            <button onclick="startEdit(${item.id})">수정</button>
                            <button onclick="deleteRecord(${item.id})" style="color:#f87171">삭제</button>
                        </div>
                    </div>
                    <div class="item-right">
                        <span class="profit-val" style="color: ${item.profit >= 0 ? 'var(--accent-up)' : 'var(--accent-down)'}">
                            ${item.profit >= 0 ? '+' : ''}${item.profit.toLocaleString()}원
                        </span>
                        <span class="calc-detail">${item.sell.toLocaleString()} - ${item.buy.toLocaleString()}</span>
                    </div>
                </div>
            `;
        }).join('');

        const total = db.reduce((s, i) => s + i.profit, 0);
        const wd = db.filter(x => !isWeekend(x.date)).reduce((s, i) => s + i.profit, 0);
        const we = db.filter(x => isWeekend(x.date)).reduce((s, i) => s + i.profit, 0);
        document.getElementById('totalProfit').innerText = total.toLocaleString() + "원";
        document.getElementById('wdProfit').innerText = wd.toLocaleString() + "원";
        document.getElementById('weProfit').innerText = we.toLocaleString() + "원";
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('profitChart').getContext('2d');
        const stats = {};
        [...db].sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(i => {
            const m = i.date.slice(5, 7) + "월";
            stats[m] = (stats[m] || 0) + i.profit;
        });
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(stats),
                datasets: [{ data: Object.values(stats), backgroundColor: '#6366f1', borderRadius: 8 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString() + '원' } } }
            }
        });
    }
    renderAll();
</script>
</body>
</html>
