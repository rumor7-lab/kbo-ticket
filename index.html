<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ticket Flow Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link class="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3172/3172551.png">
    <link class="manifest" href="data:application/manifest+json,{'name':'TicketFlow','short_name':'TicketFlow','start_url':'.','display':'standalone','background_color':'#0f172a','theme_color':'#4f46e5','icons':[{'src':'https://cdn-icons-png.flaticon.com/512/3172/3172551.png','sizes':'512x512','type':'image/png'}]}">
    <style>
        :root { 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --card-sub: #334155;
            --primary: #4f46e5; 
            --primary-glow: rgba(79, 70, 229, 0.4);
            --accent-neon: #6366f1;
            --text-main: #f8fafc; 
            --text-sub: #94a3b8; 
            --accent-up: #f43f5e; 
            --accent-down: #38bdf8; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text-main); -webkit-font-smoothing: antialiased; padding-bottom: 60px; }
        .app-container { max-width: 480px; margin: 0 auto; padding: 24px 16px; }
        
        .header-box { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--accent-neon)); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 20px var(--primary-glow); }
        .app-title { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(to right, #ffffff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
        .summary-card { background: var(--card-bg); padding: 18px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.04); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); position: relative; overflow: hidden; }
        .summary-card span { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-weight: 600; }
        .summary-card strong { font-size: 18px; font-weight: 800; color: #ffffff; letter-spacing: -0.2px; }
        .summary-card.main { grid-column: span 2; background: linear-gradient(135deg, #312e81, #1e1b4b); border: 1px solid rgba(99, 102, 241, 0.2); }
        .summary-card.main strong { font-size: 28px; color: #67e8f9; text-shadow: 0 2px 10px rgba(103, 233, 249, 0.2); }
        
        .input-form { background: var(--card-bg); padding: 24px; border-radius: 28px; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); margin-bottom: 28px; }
        .form-title { font-size: 15px; font-weight: 800; color: #ffffff; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        
        input, select { width: 100%; padding: 14px 16px; background: var(--card-sub); border: 1px solid rgba(255,255,255,0.05); border-radius: 14px; font-size: 14px; color: #ffffff; font-weight: 600; outline: none; transition: all 0.2s ease; }
        input:focus, select:focus { border-color: var(--accent-neon); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15); background: #3d4f68; }
        input[type="text"]#tDate { color: var(--text-sub); }
        
        .scan-zone { margin-bottom: 18px; background: linear-gradient(135deg, rgba(79,70,229,0.1), rgba(99,102,241,0.05)); border: 2px dashed rgba(99,102,241,0.3); border-radius: 16px; padding: 16px; transition: all 0.2s; }
        .scan-zone:active { background: rgba(79,70,229,0.15); transform: scale(0.99); }
        .scan-label { font-size: 14px; font-weight: 800; color: #a5b4fc; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .scan-status { font-size: 12px; color: #67e8f9; margin-top: 8px; display: none; font-weight: 700; text-align: center; }

        .kbo-schedule-box { margin-top: 14px; background: var(--card-sub); padding: 14px; border-radius: 16px; display: none; }
        .kbo-title { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 10px; display: block; }
        .kbo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .kbo-match-btn { background: #1e293b; border: 1px solid rgba(255,255,255,0.04); padding: 12px; border-radius: 12px; font-size: 13px; text-align: center; cursor: pointer; font-weight: 700; color: #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.15s; }
        .kbo-match-btn:active { transform: scale(0.95); background: var(--primary); color: white; }
        .kbo-match-btn span { color: #818cf8; font-weight: 900; }

        .add-btn { width: 100%; background: linear-gradient(135deg, var(--primary), var(--accent-neon)); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 800; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; box-shadow: 0 8px 24px var(--primary-glow); transition: all 0.2s; }
        .add-btn:active { transform: scale(0.98); opacity: 0.9; }
        .update-mode-btn { background: linear-gradient(135deg, #059669, #10b981); box-shadow: 0 8px 24px rgba(16,185,129,0.3); }
        
        .list-header { font-size: 17px; font-weight: 800; margin-bottom: 14px; color: #ffffff; display: flex; align-items: center; justify-content: space-between; }
        .ticket-item { background: var(--card-bg); padding: 18px; border-radius: 24px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.02); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .item-info { display: flex; flex-direction: column; gap: 4px; }
        .item-team { font-weight: 800; font-size: 16px; color: #ffffff; }
        .item-date { font-size: 12px; color: var(--text-sub); font-weight: 500; }
        .btn-group { display: flex; gap: 14px; margin-top: 10px; }
        .btn-group button { background: none; border: none; padding: 0; font-size: 12px; color: var(--text-sub); font-weight: 600; cursor: pointer; }
        
        .item-right { text-align: right; display: flex; flex-direction: column; gap: 3px; }
        .profit-val { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; }
        .calc-detail { font-size: 11px; color: var(--text-sub); display: block; font-weight: 500; }
        
        .chart-box { background: var(--card-bg); padding: 24px; border-radius: 28px; margin-top: 28px; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .backup-zone { display: flex; gap: 10px; margin-bottom: 24px; justify-content: flex-end; }
        .backup-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 10px; font-size: 12px; font-weight: 700; color: #cbd5e1; cursor: pointer; }
        
        .pagination-zone { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 24px 0; }
        .page-btn { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.04); padding: 10px 18px; border-radius: 12px; font-size: 13px; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .page-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .page-info { font-size: 13px; font-weight: 700; color: var(--text-sub); }
    </style>
</head>
<body>

<div class="app-container">
    <header class="header-box">
        <div class="header-left">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>
            </div>
            <div>
                <h1 class="app-title">Ticket Flow</h1>
                <p style="margin:2px 0 0 0; color: var(--text-sub); font-size: 12px; font-weight: 600; letter-spacing: 0.5px;">PRO MANAGER</p>
            </div>
        </div>
    </header>

    <div class="backup-zone">
        <button class="backup-btn" onclick="exportData()">📥 백업</button>
        <button class="backup-btn" onclick="importData()">📤 복구</button>
    </div>

    <div class="summary-grid">
        <div class="summary-card main">
            <span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> 순이익 합계 (수수료 10% 자동 반영)</span>
            <strong id="totalProfit">0원</strong>
        </div>
        <div class="summary-card">
            <span>📅 평일 순수익</span>
            <strong id="wdProfit">0원</strong>
        </div>
        <div class="summary-card">
            <span>🏖️ 주말 순수익</span>
            <strong id="weProfit">0원</strong>
        </div>
        <div class="summary-card">
            <span>📈 총 거래</span>
            <strong id="totalCount">0건</strong>
        </div>
        <div class="summary-card">
            <span>💡 건당 평균</span>
            <strong id="avgProfit">0원</strong>
        </div>
    </div>

    <div class="input-form">
        <span id="formTitle" class="form-title">📝 거래 명세서 입력</span>
        <input type="hidden" id="editId">
        
        <div class="scan-zone">
            <label for="imageScanner" class="scan-label">📸 티켓베이 캡처 스캔 자동 완성</label>
            <input type="file" id="imageScanner" accept="image/*" style="display:none;" onchange="scanTicketBayImage(this)">
            <div id="scanStatus" class="scan-status">AI 이미지 분석 대기 중...</div>
        </div>

        <div class="form-row">
            <input type="text" id="tDate" placeholder="경기 일정" onfocus="(this.type='date')" onblur="if(!this.value) this.type='text'" onchange="checkKboSchedule(this.value)">
            <select id="tTeam">
                <option value="">홈구단 선택</option>
                <option value="LG">LG 트윈스</option><option value="KT">KT 위즈</option><option value="한화">한화 이글스</option><option value="두산">두산 베어스</option><option value="KIA">KIA 타이거즈</option><option value="삼성">삼성 라이온즈</option><option value="롯데">롯데 자이언츠</option><option value="NC">NC 다이노스</option><option value="SSG">SSG 랜더스</option><option value="키움">키움 히어로즈</option>
            </select>
        </div>
        <div class="form-row">
            <input type="number" id="tBuy" placeholder="구매 총원가">
            <input type="number" id="tSell" placeholder="양도 판매가">
        </div>
        
        <div id="kboBox" class="kbo-schedule-box">
            <span class="kbo-title">⚾️ KBO 확정 매치업 리스트 (터치 매칭)</span>
            <div id="kboGrid" class="kbo-grid"></div>
        </div>
        <div style="height:8px;"></div>

        <button id="submitBtn" class="add-btn" onclick="handleSave()">장부 기록하기</button>
        <button id="cancelBtn" class="add-btn" style="background:#475569; box-shadow:none; display:none; margin-top:6px;" onclick="resetForm()">작업 취소</button>
    </div>

    <div class="list-header">📊 정산 장부 리스트</div>
    
    <div id="recordList"></div>

    <div class="pagination-zone">
        <button id="prevBtn" class="page-btn" onclick="changePage(-1)">이전</button>
        <span id="pageInfo" class="page-info">1 / 1</span>
        <button id="nextBtn" class="page-btn" onclick="changePage(1)">다음</button>
    </div>

    <div class="chart-box">
        <div style="font-size: 15px; font-weight: 800; margin-bottom: 18px; color: #ffffff;">월별 정산 흐름 (원)</div>
        <div style="height: 200px;"><canvas id="profitChart"></canvas></div>
    </div>
</div>

<script>
    const KBO_SCHEDULE = {
        "2026-06-24": [ {home:"LG", away:"삼성"}, {home:"두산", away:"KT"}, {home:"SSG", away:"롯데"}, {home:"한화", away:"KIA"}, {home:"키움", away:"NC"} ],
        "2026-06-25": [ {home:"LG", away:"삼성"}, {home:"두산", away:"KT"}, {home:"SSG", away:"롯데"}, {home:"한화", away:"KIA"}, {home:"키움", away:"NC"} ]
    };

    const TICKET_PRICES = {
        "LG": [
            { keyword: "그린", weekday: 12000, weekend: 13000 },
            { keyword: "네이비", weekday: 16000, weekend: 19000 },
            { keyword: "오렌지", weekday: 19000, weekend: 21000 },
            { keyword: "블루", weekday: 21000, weekend: 24000 },
            { keyword: "레드", weekday: 17000, weekend: 19000 }
        ]
    };

    let db = JSON.parse(localStorage.getItem('kbo_final')) || [];
    let chart;
    let currentPage = 1;
    const itemsPerPage = 5; 

    function isWeekend(d) {
        const day = new Date(d).getDay();
        return day === 0 || day === 6;
    }

    function sortDB() {
        db.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    // 💡 [안전 장치 코어] 이미 유저가 과거에 10% 제외 처리하여 저장해버린 원본 유실 데이터를 강제 역추적 복원하는 보안 필터
    function getCleanOriginalSell(item) {
        let rawSell = parseInt(item.sell) || 0;
        // KBO 티켓 가격은 무조건 천원/만원 단위로 끝납니다. 
        // 만약 54,000원처럼 수수료가 이미 깎여 저장된 상태라면, 끝자리가 000원으로 맞아떨어지더라도
        // profit 계산 구조나 꼬임 방지를 위해 1,000원 단위로 정확히 복원 루틴을 태웁니다.
        if (item.profit !== undefined && rawSell > 0) {
            // 과거 버전의 잔재(sell 자체에 수수료 90%만 남겨 전송했던 버그 이력 역추적)
            // 판단 기준: 판매 원본값 확인을 위해 역산 처리 검증
            if (rawSell % 10000 !== 0 && rawSell % 900 === 0) {
                return Math.round(rawSell / 0.9);
            }
        }
        return rawSell;
    }

    function scanTicketBayImage(input) {
        const file = input.files[0];
        if(!file) return;

        const statusText = document.getElementById('scanStatus');
        statusText.style.display = 'block';
        statusText.innerText = "⏳ 고성능 AI가 이미지 텍스트 판독 중...";

        Tesseract.recognize(file, 'kor+eng')
            .then(({ data: { text } }) => {
                const dateMatch = text.match(/2026\.[0-1][0-9]\.[0-3][0-9]/);
                let formattedDate = "";
                let weekendYn = false;
                if(dateMatch) {
                    formattedDate = dateMatch[0].replace(/\./g, '-');
                    weekendYn = isWeekend(formattedDate);
                }
                
                const teams = ["LG", "KT", "한화", "두산", "KIA", "삼성", "롯데", "NC", "SSG", "키움"];
                let detectedTeam = "";
                for(let t of teams) {
                    if(text.includes(t)) { detectedTeam = t; break; }
                }

                const countMatch = text.match(/([1-4])장/);
                let ticketCount = countMatch ? parseInt(countMatch[1]) : 1;

                const priceMatches = text.match(/([0-9,]+)원/g);
                let detectedPrice = 0;
                if(priceMatches && priceMatches.length > 0) {
                    const lastPrice = priceMatches[priceMatches.length - 1];
                    detectedPrice = parseInt(lastPrice.replace(/[^0-9]/g, '')) || 0;
                }

                let calculatedBuyPrice = 0;
                if (detectedTeam && TICKET_PRICES[detectedTeam]) {
                    const teamRules = TICKET_PRICES[detectedTeam];
                    for (let rule of teamRules) {
                        if (text.includes(rule.keyword)) {
                            const singlePrice = weekendYn ? rule.weekend : rule.weekday;
                            calculatedBuyPrice = singlePrice * ticketCount;
                            break;
                        }
                    }
                }

                if (calculatedBuyPrice === 0 && detectedPrice > 0) {
                    calculatedBuyPrice = Math.round((detectedPrice * 0.6) / 1000) * 1000;
                }

                if(formattedDate) {
                    const dateInput = document.getElementById('tDate');
                    dateInput.type = 'date';
                    dateInput.value = formattedDate;
                    checkKboSchedule(formattedDate);
                }
                if(detectedTeam) document.getElementById('tTeam').value = detectedTeam;
                
                // 수수료 전혀 건드리지 않은 이미지 문자 순수 정가액 그대로 주입
                if(detectedPrice > 0) document.getElementById('tSell').value = detectedPrice;
                if(calculatedBuyPrice > 0) document.getElementById('tBuy').value = calculatedBuyPrice;

                statusText.innerText = "✅ 금융 명세 스캔 완료!";
                statusText.style.color = "#34d399";
                setTimeout(() => { statusText.style.display = 'none'; statusText.style.color = 'var(--text-sub)'; }, 4000);
            })
            .catch(err => {
                statusText.innerText = "❌ 스캔 실패. 직접 입력해주세요.";
                statusText.style.color = "var(--accent-up)";
            });
    }

    function checkKboSchedule(dateString) {
        const kboBox = document.getElementById('kboBox');
        const kboGrid = document.getElementById('kboGrid');
        
        if (!dateString || !KBO_SCHEDULE[dateString]) {
            kboBox.style.display = 'none';
            kboGrid.innerHTML = '';
            return;
        }

        const matches = KBO_SCHEDULE[dateString];
        kboBox.style.display = 'block';
        kboGrid.innerHTML = matches.map(match => {
            return `<div class="kbo-match-btn" onclick="selectKboMatch('${match.home}')"><span>${match.home}</span> vs ${match.away}</div>`;
        }).join('');
    }

    function selectKboMatch(homeTeam) {
        document.getElementById('tTeam').value = homeTeam;
    }

    function handleSave() {
        const id = document.getElementById('editId').value;
        const date = document.getElementById('tDate').value;
        const team = document.getElementById('tTeam').value;
        const buy = parseInt(document.getElementById('tBuy').value) || 0;
        const sell = parseInt(document.getElementById('tSell').value) || 0;

        if(!date || !team) return alert("날짜와 팀을 선택해주세요.");

        // 원본 데이터를 그대로 배열장부에 추가 저장 (세이브 시 10% 디덕션 선반영 수식 제거)
        const record = { id: id ? parseInt(id) : Date.now(), date, team, buy, sell };

        if(id) {
            const idx = db.findIndex(x => x.id === parseInt(id));
            db[idx] = record;
        } else {
            db.push(record);
            currentPage = 1;
        }

        sortDB();
        localStorage.setItem('kbo_final', JSON.stringify(db));
        resetForm();
        renderAll();
    }

    function startEdit(id) {
        const item = db.find(x => x.id === id);
        document.getElementById('editId').value = item.id;
        
        const dateInput = document.getElementById('tDate');
        dateInput.type = 'date';
        dateInput.value = item.date;
        checkKboSchedule(item.date);

        document.getElementById('tTeam').value = item.team;
        document.getElementById('tBuy').value = item.buy;
        
        // 수정할 때도 원본 자동복원 필터 통과 후 노출
        document.getElementById('tSell').value = getCleanOriginalSell(item);
        
        document.getElementById('formTitle').innerText = "🔄 정산서 정보 전면 수정 중...";
        document.getElementById('submitBtn').innerText = "수정본 제출하기";
        document.getElementById('submitBtn').classList.add('update-mode-btn');
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function resetForm() {
        document.getElementById('editId').value = '';
        const dateInput = document.getElementById('tDate');
        dateInput.type = 'text';
        dateInput.value = '';
        
        document.getElementById('kboBox').style.display = 'none';
        document.getElementById('kboGrid').innerHTML = '';
        document.getElementById('imageScanner').value = '';

        document.getElementById('tTeam').value = '';
        document.getElementById('tBuy').value = '';
        document.getElementById('tSell').value = '';
        document.getElementById('formTitle').innerText = "📝 거래 명세서 입력";
        document.getElementById('submitBtn').innerText = "장부 기록하기";
        document.getElementById('submitBtn').classList.remove('update-mode-btn');
        document.getElementById('cancelBtn').style.display = 'none';
    }

    function deleteRecord(id) {
        if(confirm("이 내역을 완전히 영구 삭제하시겠습니까?")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem('kbo_final', JSON.stringify(db));
            const maxPage = Math.ceil(db.length / itemsPerPage) || 1;
            if(currentPage > maxPage) currentPage = maxPage;
            renderAll();
        }
    }

    function exportData() {
        if(db.length === 0) return alert("내보낼 장부 데이터가 없습니다.");
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `ticket_flow_premium_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsText(file, 'UTF-8');
            reader.onload = readerEvent => {
                try {
                    const content = JSON.parse(readerEvent.target.result);
                    if(Array.isArray(content)) {
                        if(confirm("보관된 파일로 전체 복구 처리를 진행할까요?")) {
                            db = content;
                            localStorage.setItem('kbo_final', JSON.stringify(db));
                            currentPage = 1;
                            renderAll();
                            alert("성공적으로 프리미엄 마진 데이터가 대동기화 되었습니다!");
                        }
                    } else {
                        alert("복구용 JSON 규격에 위배되는 파일입니다.");
                    }
                } catch(err) {
                    alert("시스템 에러: 파일을 복원할 수 없습니다.");
                }
            }
        }
        input.click();
    }

    function changePage(direction) {
        const maxPage = Math.ceil(db.length / itemsPerPage) || 1;
        currentPage += direction;
        if(currentPage < 1) currentPage = 1;
        if(currentPage > maxPage) currentPage = maxPage;
        renderAll();
    }

    // 💡 화면 렌더링 시 과거 비정상 데이터 우회 연산 가동
    function renderAll() {
        sortDB();
        const maxPage = Math.ceil(db.length / itemsPerPage) || 1;
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pagedDb = db.slice(startIndex, endIndex);

        const list = document.getElementById('recordList');
        if (pagedDb.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:var(--text-sub); padding:50px; font-size:14px; font-weight:600; background:var(--card-bg); border-radius:24px;">📈 입출고 거래 기록이 공백 상태입니다.</div>`;
        } else {
            list.innerHTML = pagedDb.map(item => {
                const we = isWeekend(item.date);
                
                // 역추적 필터 통과한 깨끗한 순수 판매원가 추출
                const cleanSell = getCleanOriginalSell(item);
                const tbayFee = Math.round(cleanSell * 0.1);
                const settlement = cleanSell - tbayFee;
                const recordProfit = settlement - item.buy;

                return `
                    <div class="ticket-item">
                        <div class="item-info">
                            <span class="item-team">${item.team} 홈경기 대진</span>
                            <span class="item-date">${item.date} • ${we ? '주말 프리미엄' : '평일 베이스'}</span>
                            <div class="btn-group">
                                <button onclick="startEdit(${item.id})">⚙️ 수정</button>
                                <button onclick="deleteRecord(${item.id})" style="color:var(--accent-up)">🗑️ 삭제</button>
                            </div>
                        </div>
                        <div class="item-right">
                            <span class="profit-val" style="color: ${recordProfit >= 0 ? 'var(--accent-up)' : 'var(--accent-down)'}">
                                ${recordProfit >= 0 ? '+' : ''}${recordProfit.toLocaleString()}원
                            </span>
                            <span class="calc-detail">정산액 ${settlement.toLocaleString()}원 <span style="font-size:9px; color:#64748b;">(수수료 -${tbayFee.toLocaleString()})</span></span>
                            <span class="calc-detail" style="color:#64748b;">원가 지출 ${item.buy.toLocaleString()}원</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('pageInfo').innerText = `${currentPage} / ${maxPage}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage === maxPage);

        // 상단 자산 현황 대시보드 스케줄러 동기화 연산
        const total = db.reduce((s, i) => {
            const cleanSell = getCleanOriginalSell(i);
            return s + (Math.round(cleanSell * 0.9) - i.buy);
        }, 0);
        
        const wd = db.filter(x => !isWeekend(x.date)).reduce((s, i) => {
            const cleanSell = getCleanOriginalSell(i);
            return s + (Math.round(cleanSell * 0.9) - i.buy);
        }, 0);
        
        const we = db.filter(x => isWeekend(x.date)).reduce((s, i) => {
            const cleanSell = getCleanOriginalSell(i);
            return s + (Math.round(cleanSell * 0.9) - i.buy);
        }, 0);
        
        const count = db.length;
        const avg = count > 0 ? Math.round(total / count) : 0;

        document.getElementById('totalProfit').innerText = total.toLocaleString() + "원";
        document.getElementById('wdProfit').innerText = wd.toLocaleString() + "원";
        document.getElementById('weProfit').innerText = we.toLocaleString() + "원";
        document.getElementById('totalCount').innerText = count.toLocaleString() + "건";
        document.getElementById('avgProfit').innerText = avg.toLocaleString() + "원";
        
        updateChart();
    }

    function updateChart() {
        const ctx = document.getElementById('profitChart').getContext('2d');
        const stats = {};
        [...db].sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(i => {
            const m = i.date.slice(5, 7) + "월";
            const cleanSell = getCleanOriginalSell(i);
            const recordProfit = Math.round(cleanSell * 0.9) - i.buy;
            stats[m] = (stats[m] || 0) + recordProfit;
        });
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(stats),
                datasets: [{ 
                    data: Object.values(stats), 
                    backgroundColor: '#4f46e5',
                    hoverBackgroundColor: '#6366f1',
                    borderRadius: 10,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, beginAtZero: true, ticks: { color: '#94a3b8', callback: v => v.toLocaleString() + '원' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                }
            }
        });
    }
    renderAll();
</script>
</body>
</html>
