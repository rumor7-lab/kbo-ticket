<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ticket Flow Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #6366f1; --primary-light: #eef2ff;
      --bg: #f8fafc; --card: #fff; --border: #f1f5f9;
      --text: #1e293b; --sub: #64748b;
      --red: #ef4444; --blue: #3b82f6; --green: #10b981;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }

    .tab-nav { position: sticky; top: 0; z-index: 100; background: var(--card); border-bottom: 1px solid var(--border); display: flex; }
    .tab-btn { flex: 1; padding: 14px 0; border: none; background: none; font-size: 13px; font-weight: 700; color: var(--sub); cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .panel { display: none; }
    .panel.active { display: block; }
    .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

    /* TRACKER */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .logo { width: 42px; height: 42px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 4px 12px rgba(99,102,241,.3); flex-shrink: 0; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 15px; }
    .card.span2 { grid-column: span 2; background: var(--primary); color: #fff; }
    .card label { font-size: 11px; font-weight: 700; color: var(--sub); display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
    .card.span2 label { color: rgba(255,255,255,.8); }
    .card strong { font-size: 18px; font-weight: 800; }

    .form-box { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px -5px rgba(0,0,0,.06); margin-bottom: 20px; }
    .form-title { font-size: 14px; font-weight: 700; color: var(--sub); display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    input, select { width: 100%; padding: 12px 14px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; background: #fff; transition: border-color .2s; }
    input:focus, select:focus { border-color: var(--primary); }
    .btn { width: 100%; border: none; padding: 15px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .15s; }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-gray { background: #cbd5e1; color: #fff; margin-top: 6px; display: none; }

    .section-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
    .record { background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; border: 1px solid var(--border); }
    .record-left { display: flex; flex-direction: column; gap: 3px; }
    .record-team { font-weight: 800; font-size: 15px; }
    .record-date { font-size: 12px; color: var(--sub); }
    .record-actions { display: flex; gap: 12px; margin-top: 8px; }
    .record-actions button { background: none; border: none; font-size: 12px; color: var(--sub); text-decoration: underline; cursor: pointer; padding: 0; }
    .record-right { text-align: right; }
    .profit { font-size: 17px; font-weight: 800; }
    .profit-detail { font-size: 10px; color: #94a3b8; margin-top: 2px; display: block; }
    .chart-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-top: 20px; }

    /* SCHEDULE */
    .sched-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .sched-top h2 { font-size: 20px; font-weight: 800; }
    .kbo-link { font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 700; background: var(--primary-light); padding: 6px 12px; border-radius: 20px; }

    .filter-box { background: var(--card); border-radius: 16px; padding: 14px; margin-bottom: 14px; border: 1px solid var(--border); }
    .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .filter-row select { font-size: 13px; padding: 10px 12px; }

    /* 업데이트 상태 */
    .update-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--sub); }
    .update-bar .status { display: flex; align-items: center; gap: 6px; }
    .dot-live { width: 7px; height: 7px; background: var(--green); border-radius: 50%; }
    .dot-stale { width: 7px; height: 7px; background: #f59e0b; border-radius: 50%; }
    .dot-error { width: 7px; height: 7px; background: var(--red); border-radius: 50%; }

    .notice { background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px; padding: 11px 14px; margin-bottom: 14px; font-size: 12px; color: #92400e; line-height: 1.6; }

    .day-card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
    .day-header { background: var(--primary-light); padding: 10px 16px; font-size: 13px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
    .badge-we { background: #fef2f2; color: var(--red); }
    .badge-hol { background: #fff7ed; color: #ea580c; }
    .badge-star { background: #fef9c3; color: #854d0e; }
    .game-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .game-teams { font-size: 14px; font-weight: 700; }
    .game-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .game-note { font-size: 11px; color: #ea580c; margin-top: 2px; }
    .game-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
    .game-time { font-size: 13px; font-weight: 700; color: var(--primary); }
    .add-btn-sm { background: var(--primary-light); color: var(--primary); border: none; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; cursor: pointer; }

    .empty { text-align: center; padding: 50px 20px; color: var(--sub); }
    .empty .icon { font-size: 44px; margin-bottom: 12px; }
    .empty strong { display: block; font-size: 15px; margin-bottom: 6px; color: var(--text); }

    .loading { text-align: center; padding: 40px; color: var(--sub); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('tracker')">📋 수익 관리</button>
  <button class="tab-btn" onclick="switchTab('schedule')">📅 경기 일정</button>
</nav>

<!-- ═══ TRACKER ═══ -->
<div id="tab-tracker" class="panel active">
<div class="wrap">
  <header class="header">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
        <path d="M13 5v2M13 17v2M13 11v2"/>
      </svg>
    </div>
    <div>
      <h1 style="font-size:22px;font-weight:800;">Ticket Flow</h1>
      <p style="font-size:13px;color:var(--sub);">KBO 양도 수익 매니저</p>
    </div>
  </header>

  <div class="summary-grid">
    <div class="card span2"><label>💰 누적 수익</label><strong id="totalProfit">0원</strong></div>
    <div class="card"><label>📅 평일</label><strong id="wdProfit">0원</strong></div>
    <div class="card"><label>🎉 주말</label><strong id="weProfit">0원</strong></div>
  </div>

  <div class="form-box">
    <div id="formTitle" class="form-title">📝 새 기록 입력</div>
    <input type="hidden" id="editId">
    <div class="row2">
      <input type="date" id="tDate">
      <select id="tTeam">
        <option value="">홈구단 선택</option>
        <option>LG</option><option>KT</option><option>한화</option><option>두산</option>
        <option>KIA</option><option>삼성</option><option>롯데</option><option>NC</option>
        <option>SSG</option><option>키움</option>
      </select>
    </div>
    <div class="row2">
      <input type="number" id="tBuy" placeholder="구매가">
      <input type="number" id="tSell" placeholder="양도가">
    </div>
    <button id="submitBtn" class="btn btn-primary" onclick="handleSave()">저장하기</button>
    <button id="cancelBtn" class="btn btn-gray" onclick="resetForm()">취소</button>
  </div>

  <div class="section-title">📊 양도 기록 (최신순)</div>
  <div id="recordList"></div>
  <div class="chart-box">
    <div style="font-size:14px;font-weight:700;margin-bottom:14px;color:var(--sub);">월별 수익 현황 (원)</div>
    <div style="height:200px"><canvas id="profitChart"></canvas></div>
  </div>
</div>
</div>

<!-- ═══ SCHEDULE ═══ -->
<div id="tab-schedule" class="panel">
<div class="wrap">
  <div class="sched-top">
    <h2>📅 KBO 경기 일정</h2>
    <a class="kbo-link" href="https://www.koreabaseball.com/schedule/schedule.aspx" target="_blank">KBO 공식 ↗</a>
  </div>

  <!-- 업데이트 상태 -->
  <div class="update-bar">
    <div class="status" id="updateStatus">
      <div class="dot-stale"></div>
      <span>일정 불러오는 중...</span>
    </div>
    <span id="updateTime"></span>
  </div>

  <div class="notice">
    ℹ️ GitHub Actions가 매일 새벽 자동으로 최신 일정을 가져옵니다.<br>
    우천취소·변경은 <strong>KBO 공식 사이트</strong>에서 확인하세요.
  </div>

  <div class="filter-box">
    <div class="filter-row">
      <select id="filterTeam" onchange="renderSchedule()">
        <option value="전체">전체 구단</option>
        <option>LG</option><option>KT</option><option>한화</option><option>두산</option>
        <option>KIA</option><option>삼성</option><option>롯데</option><option>NC</option>
        <option>SSG</option><option>키움</option>
      </select>
      <select id="filterMonth" onchange="renderSchedule()">
        <option value="all">전체 기간</option>
        <option value="06">6월</option>
        <option value="07">7월</option>
        <option value="08">8월</option>
        <option value="09">9월</option>
        <option value="10">10월</option>
      </select>
    </div>
  </div>

  <div id="scheduleList">
    <div class="loading"><div class="spinner"></div>일정 로딩 중...</div>
  </div>
</div>
</div>

<script>
// ──────────────────────────────────────────
//  탭 전환
// ──────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab === 'tracker' ? 0 : 1].classList.add('active');
  if (tab === 'schedule' && !window._scheduleLoaded) loadSchedule();
}

// ──────────────────────────────────────────
//  schedule.json 로딩
// ──────────────────────────────────────────
let scheduleData = [];
window._scheduleLoaded = false;

async function loadSchedule() {
  try {
    // 캐시 버스팅으로 항상 최신 파일 가져오기
    const res = await fetch('./schedule.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    
    scheduleData = data.games || [];
    window._scheduleLoaded = true;

    // 업데이트 시간 표시
    const bar = document.getElementById('updateStatus');
    bar.innerHTML = `<div class="dot-live"></div><span>최신 데이터</span>`;
    document.getElementById('updateTime').textContent = data.updated ? `업데이트: ${data.updated}` : '';

    renderSchedule();
  } catch (e) {
    document.getElementById('updateStatus').innerHTML = `<div class="dot-error"></div><span>schedule.json 로드 실패</span>`;
    document.getElementById('scheduleList').innerHTML = `
      <div class="empty">
        <div class="icon">⚠️</div>
        <strong>일정 파일을 찾을 수 없어요</strong>
        <span style="font-size:13px;margin-top:8px;display:block;">
          GitHub Actions가 아직 실행 전이거나<br>
          <code>schedule.json</code>이 없는 상태예요.<br><br>
          저장소에서 Actions → <strong>KBO 일정 자동 업데이트</strong> →<br>
          <strong>Run workflow</strong>를 수동으로 한 번 실행해 주세요.
        </span>
      </div>`;
  }
}

// ──────────────────────────────────────────
//  일정 렌더링
// ──────────────────────────────────────────
const DAYS = ['일','월','화','수','목','금','토'];
const TEAM_EMOJI = {LG:'🔵',KT:'🔴',한화:'🟠',두산:'🔵',KIA:'⚫',SSG:'🔴',삼성:'🔵',롯데:'🔵',NC:'🟢',키움:'🔴'};

function renderSchedule() {
  if (!window._scheduleLoaded) return;

  const teamF = document.getElementById('filterTeam').value;
  const monthF = document.getElementById('filterMonth').value;
  const today = new Date().toISOString().slice(0, 10);

  let games = scheduleData.filter(g => {
    if (monthF !== 'all' && g.date.slice(5, 7) !== monthF) return false;
    if (teamF !== '전체' && g.home !== teamF && g.away !== teamF) return false;
    return true;
  });

  if (games.length === 0) {
    document.getElementById('scheduleList').innerHTML = `
      <div class="empty"><div class="icon">😕</div><strong>해당 일정이 없어요</strong></div>`;
    return;
  }

  // 날짜별 그룹
  const grouped = {};
  games.forEach(g => { (grouped[g.date] = grouped[g.date] || []).push(g); });

  let html = '';
  Object.entries(grouped).sort(([a],[b]) => a.localeCompare(b)).forEach(([date, list]) => {
    const d = new Date(date + 'T00:00:00');
    const dow = d.getDay();
    const isWE = dow === 0 || dow === 6;
    const isPast = date < today;
    const label = `${parseInt(date.slice(5,7))}/${parseInt(date.slice(8,10))} (${DAYS[dow]})`;

    let badges = isWE ? `<span class="badge badge-we">주말</span>` : '';
    if (list.some(g => g.note)) {
      const note = list.find(g => g.note)?.note || '';
      if (note.includes('올스타')) badges += `<span class="badge badge-star">⭐ 올스타전</span>`;
      else badges += `<span class="badge badge-hol">공휴일</span>`;
    }

    html += `<div class="day-card" style="${isPast ? 'opacity:.55' : ''}">
      <div class="day-header">📆 ${label} ${badges}</div>`;

    list.forEach(g => {
      if (g.note && !g.home) {
        html += `<div style="padding:14px 16px;text-align:center;font-size:14px;font-weight:700;color:#854d0e;border-top:1px solid var(--border);">${g.note}</div>`;
      } else {
        const emoji = TEAM_EMOJI[g.home] || '⚾';
        html += `<div class="game-row">
          <div>
            <div class="game-teams">${emoji} ${g.home} <span style="color:var(--sub);font-weight:400;font-size:12px">vs</span> ${g.away}</div>
            <div class="game-meta">🏟️ ${g.stadium || '-'}</div>
            ${g.note ? `<div class="game-note">${g.note}</div>` : ''}
          </div>
          <div class="game-right">
            <span class="game-time">${g.time || ''}</span>
            ${!isPast ? `<button class="add-btn-sm" onclick="quickAdd('${date}','${g.home}')">+ 기록 추가</button>` : ''}
          </div>
        </div>`;
      }
    });
    html += '</div>';
  });

  document.getElementById('scheduleList').innerHTML = html;
}

function quickAdd(date, team) {
  switchTab('tracker');
  document.getElementById('tDate').value = date;
  document.getElementById('tTeam').value = team;
  document.getElementById('tBuy').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ──────────────────────────────────────────
//  수익 트래커
// ──────────────────────────────────────────
let db = JSON.parse(localStorage.getItem('kbo_final')) || [];
let chart;

function isWE(d) { const day = new Date(d).getDay(); return day === 0 || day === 6; }
function sortDB() { db.sort((a,b) => new Date(b.date) - new Date(a.date)); }

function handleSave() {
  const id = document.getElementById('editId').value;
  const date = document.getElementById('tDate').value;
  const team = document.getElementById('tTeam').value;
  const buy = parseInt(document.getElementById('tBuy').value) || 0;
  const sell = parseInt(document.getElementById('tSell').value) || 0;
  if (!date || !team) return alert('날짜와 팀을 선택해주세요.');
  const rec = { id: id ? parseInt(id) : Date.now(), date, team, buy, sell, profit: sell - buy };
  if (id) { const i = db.findIndex(x => x.id === parseInt(id)); db[i] = rec; }
  else db.push(rec);
  sortDB();
  localStorage.setItem('kbo_final', JSON.stringify(db));
  resetForm(); renderAll();
}

function startEdit(id) {
  const it = db.find(x => x.id === id);
  document.getElementById('editId').value = it.id;
  document.getElementById('tDate').value = it.date;
  document.getElementById('tTeam').value = it.team;
  document.getElementById('tBuy').value = it.buy;
  document.getElementById('tSell').value = it.sell;
  document.getElementById('formTitle').innerText = '🔄 기록 수정 중...';
  document.getElementById('submitBtn').innerText = '수정 완료';
  document.getElementById('submitBtn').className = 'btn btn-green';
  document.getElementById('cancelBtn').style.display = 'flex';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  ['editId','tDate','tTeam','tBuy','tSell'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('formTitle').innerText = '📝 새 기록 입력';
  document.getElementById('submitBtn').innerText = '저장하기';
  document.getElementById('submitBtn').className = 'btn btn-primary';
  document.getElementById('cancelBtn').style.display = 'none';
}

function deleteRecord(id) {
  if (confirm('정말 삭제하시겠습니까?')) {
    db = db.filter(x => x.id !== id);
    localStorage.setItem('kbo_final', JSON.stringify(db));
    renderAll();
  }
}

function renderAll() {
  sortDB();
  document.getElementById('recordList').innerHTML = db.map(it => `
    <div class="record">
      <div class="record-left">
        <span class="record-team">${it.team} 홈</span>
        <span class="record-date">${it.date} (${isWE(it.date) ? '주말' : '평일'})</span>
        <div class="record-actions">
          <button onclick="startEdit(${it.id})">수정</button>
          <button onclick="deleteRecord(${it.id})" style="color:var(--red)">삭제</button>
        </div>
      </div>
      <div class="record-right">
        <span class="profit" style="color:${it.profit >= 0 ? 'var(--red)' : 'var(--blue)'}">
          ${it.profit >= 0 ? '+' : ''}${it.profit.toLocaleString()}원
        </span>
        <span class="profit-detail">${it.sell.toLocaleString()} − ${it.buy.toLocaleString()}</span>
      </div>
    </div>`).join('');

  const total = db.reduce((s,i) => s+i.profit, 0);
  const wd = db.filter(x => !isWE(x.date)).reduce((s,i) => s+i.profit, 0);
  const we = db.filter(x => isWE(x.date)).reduce((s,i) => s+i.profit, 0);
  document.getElementById('totalProfit').innerText = total.toLocaleString() + '원';
  document.getElementById('wdProfit').innerText = wd.toLocaleString() + '원';
  document.getElementById('weProfit').innerText = we.toLocaleString() + '원';
  updateChart();
}

function updateChart() {
  const ctx = document.getElementById('profitChart').getContext('2d');
  const stats = {};
  [...db].sort((a,b) => new Date(a.date)-new Date(b.date)).forEach(i => {
    const m = i.date.slice(5,7) + '월'; stats[m] = (stats[m]||0) + i.profit;
  });
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'bar',
    data: { labels: Object.keys(stats), datasets: [{ data: Object.values(stats), backgroundColor: '#6366f1', borderRadius: 8 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString()+'원' } } } }
  });
}

// 초기화
window.addEventListener('DOMContentLoaded', () => {
  // 이번 달 필터 기본값
  const m = String(new Date().getMonth() + 1).padStart(2, '0');
  const sel = document.getElementById('filterMonth');
  for (const opt of sel.options) { if (opt.value === m) { opt.selected = true; break; } }
  renderAll();
});
</script>
</body>
</html>
